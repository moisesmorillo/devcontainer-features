name: "Release Dev Container Features"

# Publishes each feature under src/ to ghcr.io as an OCI artifact.
# Triggered on any v* tag (e.g. v1.0.0), and manually via workflow_dispatch.
#
# The devcontainers/action auto-computes the semver tag ladder:
#   tag v1.2.3 → publishes :1, :1.2, :1.2.3, and :latest
# so consumers can pin to any precision they prefer.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # id-token: write is required on first publish — GHCR's OIDC bearer
      # token exchange refuses the GITHUB_TOKEN otherwise (403 DENIED).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish Features to GHCR
        uses: devcontainers/action@v1
        env:
          # Explicit export: the action reads GITHUB_TOKEN via process.env
          # and passes it to devcontainers/cli. `permissions:` at the job
          # level grants scope to the token but does NOT export it as an
          # env var — each action has to ask. Without this block the CLI
          # falls back to anonymous and GHCR returns 403 DENIED.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "true"
          oci-registry: "ghcr.io"
          # Results in: ghcr.io/moisesmorillo/devcontainer-features/<feature-id>:<version>
          features-namespace: ${{ github.repository }}
